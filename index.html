<style>
/* עיצוב כללי ורקע יוקרתי */
body {
  margin: 0;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background-image: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%); 
  color: #333;
  scroll-behavior: smooth;
  line-height: 1.6;
}

header {
  background: #000;
  color: white;
  padding: 50px 20px;
  text-align: center;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  cursor: pointer;
}

header h1 {
  font-size: 3.5rem;
  margin: 0;
  letter-spacing: 5px;
  font-weight: 300;
}

nav {
  position: sticky;
  top: 0;
  z-index: 1000;
  display: flex;
  justify-content: center;
  gap: 30px;
  background: rgba(255, 255, 255, 0.9);
  backdrop-filter: blur(10px);
  padding: 18px;
  border-bottom: 1px solid rgba(0,0,0,0.05);
}

nav a {
  color: #111;
  text-decoration: none;
  font-weight: 600;
  font-size: 0.95rem;
  transition: 0.3s;
  letter-spacing: 0.5px;
  cursor: pointer;
}

nav a:hover, nav a.active {
  color: #c5a059;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 40px 20px;
  min-height: 60vh;
}

h2 {
  color: #111;
  margin: 40px 0 30px;
  font-weight: 400;
  text-align: center;
  position: relative;
  font-size: 2rem;
}

h2::after {
  content: "";
  display: block;
  width: 60px;
  height: 2px;
  background: #c5a059;
  margin: 15px auto;
}

.products {
  display: grid;
  grid-template-columns: repeat(2, 1fr); 
  gap: 25px;
  align-items: stretch;
  margin-bottom: 50px;
}

@media (min-width: 768px) {
  .products {
    grid-template-columns: repeat(4, 1fr); 
  }
}

.card {
  background: white;
  border-radius: 4px;
  padding: 0;
  text-align: center;
  box-shadow: 0 5px 15px rgba(0,0,0,0.05);
  transition: 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
  display: flex;
  flex-direction: column;
  height: 100%;
  overflow: hidden;
  border: 1px solid #f0f0f0;
}

.card:hover {
  transform: translateY(-10px);
  box-shadow: 0 20px 40px rgba(0,0,0,0.1);
  border-color: #c5a059;
}

.card img {
  width: 100%;
  aspect-ratio: 1/1;
  object-fit: cover;
}

.card-body {
  padding: 20px;
  display: flex;
  flex-direction: column;
  flex-grow: 1;
}

.card h3 {
  font-size: 1.05rem;
  margin: 0 0 10px;
  color: #111;
  min-height: 45px;
  font-weight: 600;
}

.card p {
  font-size: 0.85rem;
  margin: 10px 0;
  line-height: 1.5;
  color: #666;
  text-align: right;
  flex-grow: 1;
}

.price-tag {
  font-size: 1.2rem;
  font-weight: bold;
  color: #111;
  margin: 15px 0;
}

.rating {
  color: #c5a059;
  font-size: 0.85rem;
  margin-bottom: 10px;
}

.btn {
  display: block;
  padding: 12px;
  background: #111;
  color: white;
  text-decoration: none;
  font-weight: bold;
  font-size: 0.9rem;
  transition: 0.3s;
  letter-spacing: 1px;
}

.btn:hover {
  background: #c5a059;
}

.recommendation-section {
    background: #fdf6e9;
    padding: 20px;
    border-radius: 8px;
    margin-bottom: 40px;
    border: 1px dashed #c5a059;
}

.banner {
  background: white;
  padding: 40px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.05);
  line-height: 1.8;
  font-size: 0.95rem;
  border-right: 4px solid #c5a059;
}

footer {
  background: #000;
  color: white;
  text-align: center;
  padding: 60px 20px;
  margin-top: 80px;
}

#backToTop {
  position: fixed; bottom: 30px; right: 20px;
  background: #c5a059; color: white; width: 50px; height: 50px;
  display: none; align-items: center; justify-content: center;
  text-decoration: none; z-index: 1000;
}

#cookieBox {

  background: #fff; color: #111; padding: 25px; border-radius: 4px;
  display: none; z-index: 2000; max-width: 450px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  border-top: 3px solid #c5a059;
}

#cookieBox button {
  margin-top: 15px; padding: 12px; background: #111; border: none;
  color: white; cursor: pointer; width: 100%;

</style>

function createCard(p) {
    return `
    <div class="card">
      <img src="${p.img}" alt="${p.title}">
      <div class="card-body">
        <h3>${p.title}</h3>
        <p>${p.desc}</p>
        <div class="rating">★★★★★</div>
        <div class="price-tag">${p.price}</div>
        <a class="btn" href="${p.link}" target="_blank" onclick="trackClick('${p.tag}')">לקנייה</a>
      </div>
    </div>`;
}

function trackClick(tag) {
    localStorage.setItem('lastClickedTag', tag);
}

function showPage(pageId) {
    const content = document.getElementById('main-content');
    content.innerHTML = '';
    document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
    const navBtn = document.getElementById('nav-' + pageId);
    if (navBtn) navBtn.classList.add('active');
    window.scrollTo(0, 0);

    if (pageId === 'home') renderHomePage(content);
    else if (pageId === 'about') renderAboutPage(content);
    else renderCategoryPage(content, pageId);
}

    const lastTag = localStorage.getItem('lastClickedTag');
    let html = `<h2>ברוכים הבאים ל-Orvanni</h2>`;
    
    // חלק 1: המלצות מבוססות הקלקות אחרונות
    if (lastTag) {
        const recommendations = allProducts.filter(p => p.tag === lastTag).slice(0, 4);
        if (recommendations.length > 0) {
            html += `
            <div class="recommendation-section">
                <h3 style="text-align: right; padding: 0 10px;">⭐ מבוסס על מה שאהבת</h3>
                <div class="products">${recommendations.map(p => createCard(p)).join('')}</div>
            </div>`;
        }
    }

    // חלק 2: גילוי - מוצרים מקטגוריות אחרות (מניעת חזרתיות)
    html += `<h3 style="text-align: right; padding: 0 10px;">גלה פריטים חדשים</h3>
             <div class="products">`;
    
    const otherProducts = allProducts
        .filter(p => p.tag !== lastTag)
        .sort(() => 0.5 - Math.random())
        .slice(0, 12);
        
    html += otherProducts.map(p => createCard(p)).join('');
    html += `</div>`;
    
    container.innerHTML = html;
}

function renderCategoryPage(container, cat) {
    const catNames = { women: '👠 נעלי נשים', men: '👞 נעלי גברים', kids: '👟 נעלי ילדים' };
    const filtered = allProducts.filter(p => p.cat === cat);
    let html = `<h2>${catNames[cat]}</h2>`;
    html += `<div class="products">${filtered.map(p => createCard(p)).join('')}</div>`;
    container.innerHTML = html;
}

function acceptCookies() {
  localStorage.setItem("cookiesAccepted", "yes");
  document.getElementById("cookieBox").style.display = "none";
}

window.onload = function() {
  showPage('home');
  if (!localStorage.getItem("cookiesAccepted")) {
    document.getElementById("cookieBox").style.display = "block";
  }
}

window.onscroll = function() {
  let btn = document.getElementById("backToTop");
  if (document.body.scrollTop > 300 || document.documentElement.scrollTop > 300) {
    btn.style.display = "flex";
  } else {
    btn.style.display = "none";
  }
};
</script>
