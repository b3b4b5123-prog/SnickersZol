<style>
:root {
    --gold: #c5a059;
    --dark: #111;
    --light: #f9f9f9;
}

body {
    margin: 0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #fdfbfb;
    color: var(--dark);
    line-height: 1.6;
    scroll-behavior: smooth;
}

/* תפריט צף */
.floating-menu-btn {
    position: fixed; top: 20px; right: 20px; z-index: 2001;
    background: var(--dark); color: white; width: 55px; height: 55px;
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3); font-size: 24px;
}

.side-nav {
    position: fixed;
    top: 0;
    right: -320px;
    width: 300px;
    height: 100%;
    background: white;
    z-index: 2000;
    box-shadow: -5px 0 25px rgba(0,0,0,0.15);
    /* מעבר מהיר וחלק יותר */
    transition: right 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

.side-nav.open { right: 0; }

/* אזור גלילה פנימי לקטגוריות בלבד */
#menu-items-placeholder {
    flex-grow: 1;
    overflow-y: auto;
    padding-bottom: 20px;
    -webkit-overflow-scrolling: touch;
}

.nav-item { border-bottom: 1px solid #f0f0f0; }
.nav-link {
    display: flex; justify-content: space-between; align-items: center;
    padding: 15px; color: var(--dark); text-decoration: none; font-weight: 600; cursor: pointer;
}
.nav-link:hover { background: #fdfaf4; color: var(--gold); }

/* תת תפריט מהיר */
.sub-menu { 
    display: none; 
    background: #f9f9f9; 
    padding: 5px 0;
}
.sub-menu.show { display: block; }
.sub-menu a {
    display: block; padding: 10px 30px; color: #555; text-decoration: none; font-size: 0.95rem; cursor: pointer;
}

header { background: #000; color: white; padding: 60px 20px; text-align: center; cursor: pointer; }
header h1 { font-size: 3.5rem; margin: 0; letter-spacing: 6px; font-weight: 300; }

.container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; min-height: 70vh; }
.section-title { border-right: 5px solid var(--gold); padding-right: 15px; margin: 40px 0 30px; }

/* תצוגת מוצרים - 2 טורים בטלפון */
.products { 
    display: grid; 
    grid-template-columns: repeat(2, 1fr); 
    gap: 15px; 
}

@media (min-width: 768px) {
    .products { grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 30px; }
}

.card { background: white; border: 1px solid #eee; position: relative; transition: 0.4s; display: flex; flex-direction: column; }
.card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }

.fav-btn {
    position: absolute; top: 10px; left: 10px; background: rgba(255,255,255,0.9);
    border: none; border-radius: 50%; width: 35px; height: 35px; cursor: pointer;
    font-size: 18px; color: #ddd; z-index: 10;
}
.fav-btn.active { color: #e74c3c; }

.card-body { padding: 12px; text-align: center; flex-grow: 1; display: flex; flex-direction: column; }
.card h3 { font-size: 0.95rem; margin: 5px 0; }
.desc { font-size: 0.8rem; color: #777; margin-bottom: 8px; flex-grow: 1; }
.price { font-weight: bold; font-size: 1.1rem; color: var(--dark); margin-bottom: 10px; }

.btn { display: block; background: var(--dark); color: white; padding: 10px; text-decoration: none; font-size: 0.9rem; font-weight: bold; }

.banner { background: white; padding: 30px; border-right: 4px solid var(--gold); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
footer { background: #000; color: white; text-align: center; padding: 50px; margin-top: 80px; }
</style>

let favorites = JSON.parse(localStorage.getItem('favs')) || [];

function toggleMenu() { document.getElementById('sideNav').classList.toggle('open'); }
function toggleSubMenu(id) { document.getElementById(id).classList.toggle('show'); }

function trackClick(cat, gender) {
    const history = { cat, gender };
    localStorage.setItem('lastClicked', JSON.stringify(history));
}

function toggleFav(id, event) {
    event.stopPropagation();
    favorites.includes(id) ? favorites = favorites.filter(i => i !== id) : favorites.push(id);
    localStorage.setItem('favs', JSON.stringify(favorites));
    renderCurrentView();
}

let currentView = { type: 'home', cat: null, gender: null };

function showPage(type) {
    currentView = { type, cat: null, gender: null };
    if (document.getElementById('sideNav').classList.contains('open')) toggleMenu();
    renderCurrentView();
    window.scrollTo(0,0);
}

function showCategoryPage(cat, gender) {
    currentView = { type: 'category', cat, gender };
    if (document.getElementById('sideNav').classList.contains('open')) toggleMenu();
    renderCurrentView();
    window.scrollTo(0,0);
}

function renderCurrentView() {
    const content = document.getElementById('main-content');
    if (currentView.type === 'home') renderHome(content);
    else if (currentView.type === 'about') renderAbout(content);
    else renderCategory(content);
}

function createCard(p) {
    const isFav = favorites.includes(p.id);
    const roundedPrice = Math.ceil(p.price);
    return `
    <div class="card">
        <button class="fav-btn ${isFav ? 'active' : ''}" onclick="toggleFav(${p.id}, event)">❤</button>
        <img src="${p.img}" alt="${p.title}">
        <div class="card-body">
            <h3>${p.title}</h3>
            <div class="desc">${p.desc || ''}</div>
            <div class="price">₪${roundedPrice}</div>
            <a href="${p.link}" class="btn" target="_blank" onclick="trackClick('${p.cat}', '${p.gender}')">לקנייה</a>
        </div>
    </div>`;
}

function renderHome(container) {
    let html = `<h2 class="section-title">הבחירות עבורך</h2>`;
    const favItems = allProducts.filter(p => favorites.includes(p.id));
    let hasContent = false;
    
    if (favItems.length > 0) {
        html += `<h3>⭐ המועדפים שלך</h3><div class="products">${favItems.map(createCard).join('')}</div>`;
        hasContent = true;
    }

    const last = JSON.parse(localStorage.getItem('lastClicked'));
    if (last) {
        const suggested = allProducts.filter(p => p.cat === last.cat && p.gender === last.gender).slice(0, 4);
        if(suggested.length > 0) {
            html += `<h3 style="margin-top:40px;">🔍 מבוסס על מוצרים שאהבת</h3>
                     <div class="products">${suggested.map(createCard).join('')}</div>`;
            hasContent = true;
        }
    }
    
    if (!hasContent) {
        html += `<div class="banner"><p>שלום! ברוכים הבאים ל-Orvanni. כאן יופיעו מוצרים שסימנת ב-❤ או מוצרים דומים לאלו שלחצת עליהם.</p></div>`;
    }
    container.innerHTML = html;
}

function renderCategory(container) {
    // סינון חכם: מציג מוצרים שמתאימים לקטגוריה וגם (למגדר שנבחר או ליוניסקס)
    const filtered = allProducts.filter(p => 
        p.cat === currentView.cat && 
        (p.gender === currentView.gender || p.gender === 'unisex')
    );

    const genderHeb = currentView.gender === 'men' ? 'גברים' : 'נשים';
    
    let html = `<h2 class="section-title">${categoryNames[currentView.cat]} - ${genderHeb}</h2>`;
    
    if (filtered.length > 0) {
        html += `<div class="products">${filtered.map(createCard).join('')}</div>`;
    } else {
        html += `<p style="text-align: center; padding: 20px;">בקרוב יעלו מוצרים חדשים לקטגוריה זו.</p>`;
    }
    
    container.innerHTML = html;
}

        <p>על תנאי שימוש אלו יחולו חוקי מדינת ישראל. סמכות השיפוט הבלעדית תהיה לבתי המשפט המוסמכים במחוז חיפה.</p>
        
        <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
        <p style="font-size: 0.8rem; color: #777;">עודכן לאחרונה: אפריל 2026</p>
    </div>`;
}

function initMenu() {
    const placeholder = document.getElementById('menu-items-placeholder');
    let menuHtml = '';
    for (const [key, label] of Object.entries(categoryNames)) {
        menuHtml += `
        <div class="nav-item">
            <div class="nav-link" onclick="toggleSubMenu('sub-${key}')">${label} <span>▼</span></div>
            <div class="sub-menu" id="sub-${key}">
                <a onclick="showCategoryPage('${key}', 'men')">גברים</a>
                <a onclick="showCategoryPage('${key}', 'women')">נשים</a>
            </div>
        </div>`;
    }
    placeholder.innerHTML = menuHtml;
}

window.onload = () => { initMenu(); showPage('home'); };
</script>
</body>
</html>
